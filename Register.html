<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <link rel="stylesheet" href="Register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <img src="Assets/Login/Loginwall.jpg">
    <div class="login-box">
        <h2>Register</h2>
            <div class="user-box">
                <input type="text" id="usernameInput" required>
                <label for="">Username</label>
            </div>

            <div class="user-box">
                <input type="password" id="passwordInput" required>
                <label for="">Password</label>
            </div>

            <div class="remember">
                <input type="checkbox">
                Remember me
            </div>
            <br>
            <div class="Login">
                I already have an account <a href="Login.html">Login</a>
            </div>

            <button type="button" id="registerBtn" class="Submit">Submit</button>
    </div>
    <script type="module" src="Register.js"></script>
</body>
</html>
